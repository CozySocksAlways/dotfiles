# Fingerprint Reader Setup — ThinkPad T14 Gen 5
# Device: Synaptics 06cb:00f9 (built-in)

# Step 1 — Install fprintd
sudo pacman -S fprintd
sudo systemctl enable --now fprintd

# Step 2 — Check if libfprint detects the device
fprintd-list $USER
# If "no devices found", install the AUR driver instead:
#   yay -S open-fprintd-git python-validity
#   sudo systemctl enable --now open-fprintd python3-validity

# Step 3 — Enroll fingerprint
fprintd-enroll -f right-index-finger $USER
# Follow prompts — swipe 5 times

# Step 4 — Hook into PAM
# Add to the TOP of the relevant /etc/pam.d/ files:
#   auth sufficient pam_fprintd.so
#
# For swaylock (/etc/pam.d/swaylock):
#   auth sufficient pam_fprintd.so
#   auth include system-local-login
#
# Other candidates: /etc/pam.d/sudo, /etc/pam.d/login
